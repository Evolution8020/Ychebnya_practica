<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Система учёта молочной продукции</title>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="theme_base.css">
    <link rel="stylesheet" href="style_login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Учёт молочной продукции</h1>
            <p>Вход в систему</p>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" required placeholder="Введите ваш логин">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required placeholder="Введите ваш пароль">
            </div>

            <button type="submit" class="auth-btn">Войти</button>
        </form>

        <div class="auth-footer">
            <p>Нет аккаунта? <a href="reg.html">Зарегистрироваться</a></p>
        </div>
    </div>

    <script src="user_menu.js"></script>
    <script src="script_login.js"></script>
</body>
</html>
